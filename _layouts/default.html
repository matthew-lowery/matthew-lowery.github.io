<!doctype html>
<html lang="{{ site.locale | default: 'en-US' | slice: 0,2 }}">
  <head>
    {% include editorial-head.html %}
  </head>

    <a class="skip-link" href="#content">Skip to content</a>

      {% endunless %}
    </div>
  </body>
</html>
