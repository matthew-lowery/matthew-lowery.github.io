{% include base_path %}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{% include seo.html %}
<meta name="theme-color" content="#f4f0e5">
<link rel="stylesheet" href="{{ base_path }}/assets/css/editorial.css">
<link
  rel="alternate"
  type="application/atom+xml"
  title="{{ site.title }} feed"
  href="{{ base_path }}/feed.xml"
>
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    }
  };
</script>
<script
  async
  id="MathJax-script"
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
></script>
